openapi: 3.0.3
info:
  title: Invoice API
  version: 0.1.0
  description: |
    Minimal AR invoice API with auto-matching of incoming payments to open invoices.
    Built as a learning project around accounts-receivable reconciliation.
 
servers:
  - url: http://localhost:3000
    description: Local dev
 
security:
  - ApiKeyAuth: []
 
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
 
  schemas:
    Invoice:
      type: object
      properties:
        invoice_id: { type: string, example: "INV-1001" }
        customer:   { type: string, example: "Acme Corp" }
        amount:     { type: number, example: 1500.00 }
        due_date:   { type: string, format: date, example: "2026-04-01" }
        status:
          type: string
          enum: [open, paid, cancelled]
          example: "open"
        created_at: { type: string, example: "2026-04-27 12:34:56" }
      required: [invoice_id, customer, amount, due_date]
 
    CreateInvoice:
      type: object
      properties:
        invoice_id: { type: string }
        customer:   { type: string }
        amount:     { type: number }
        due_date:   { type: string, format: date }
      required: [invoice_id, customer, amount, due_date]
 
    InvoiceList:
      type: object
      properties:
        total:  { type: integer }
        limit:  { type: integer }
        offset: { type: integer }
        items:
          type: array
          items: { $ref: "#/components/schemas/Invoice" }
 
    UpdateStatus:
      type: object
      properties:
        status: { type: string, enum: [open, paid, cancelled] }
      required: [status]
 
    CreatePayment:
      type: object
      properties:
        payment_id:   { type: string, example: "PAY-5001" }
        payer_name:   { type: string, example: "Acme Corp" }
        amount:       { type: number, example: 1500.00 }
        reference:    { type: string, example: "INV-1001" }
        payment_date: { type: string, format: date, example: "2026-04-02" }
      required: [payment_id, payer_name, amount, payment_date]
 
    PaymentResponse:
      type: object
      properties:
        payment: { type: object }
        match:
          type: object
          nullable: true
          properties:
            rule:
              type: string
              enum: [reference_match, exact_amount_name, fuzzy_match]
            confidence:      { type: number }
            invoice_id:      { type: string }
            auto_closed:     { type: boolean }
            requires_review: { type: boolean }
 
    Error:
      type: object
      properties:
        error:   { type: string }
        message: { type: string }
        details: { type: array, items: { type: object } }
 
paths:
  /invoices:
    post:
      summary: Create an invoice
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateInvoice" }
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/Invoice" }}}}
        "400": { description: Validation error, content: { application/json: { schema: { $ref: "#/components/schemas/Error" }}}}
        "409": { description: Already exists,    content: { application/json: { schema: { $ref: "#/components/schemas/Error" }}}}
    get:
      summary: List invoices
      parameters:
        - in: query
          name: status
          schema: { type: string, enum: [open, paid, cancelled] }
        - in: query
          name: customer
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, default: 20, maximum: 100 }
        - in: query
          name: offset
          schema: { type: integer, default: 0 }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/InvoiceList" }}}}
 
  /invoices/{id}:
    get:
      summary: Fetch one invoice
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Invoice" }}}}
        "404": { description: Not found }
 
  /invoices/{id}/status:
    patch:
      summary: Update invoice status
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateStatus" }
      responses:
        "200": { description: Updated, content: { application/json: { schema: { $ref: "#/components/schemas/Invoice" }}}}
        "404": { description: Not found }
 
  /payments:
    post:
      summary: Record a payment and auto-attempt matching
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreatePayment" }
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/PaymentResponse" }}}}
        "400": { description: Validation error }
        "409": { description: Already exists }
    get:
      summary: List payments
      responses:
        "200": { description: OK }
 